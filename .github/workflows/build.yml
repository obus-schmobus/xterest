name: Build xterest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Theos
      run: |
        sudo apt-get install -y bash curl fakeroot
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Build debug packages
      run: |
        make package
        make package THEOS_PACKAGE_SCHEME=rootless

    - name: Build release packages
      run: |
        make package FINALPACKAGE=1
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

    - name: Extract dylib for sideloading
      run: |
        mkdir -p dist
        # Copy all .deb packages
        cp packages/*.deb dist/
        # Extract the dylib from the rootless release .deb for LiveContainer/sideloading use
        ROOTLESS_DEB=$(ls packages/ | grep -i 'iphoneos-arm64.deb' | grep -v 'debug' | head -1)
        if [ -n "$ROOTLESS_DEB" ]; then
          mkdir -p /tmp/deb-extract
          dpkg-deb -x "packages/$ROOTLESS_DEB" /tmp/deb-extract
          find /tmp/deb-extract -name "*.dylib" -exec cp {} dist/ \;
        fi
        ls -la dist/

    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xterest-build
        path: dist/
